# ══════════════════════════════════════════════════════════════════════
# mail.properties — Shared Mail Storage Configuration
# Place this file at the PROJECT ROOT (next to the parent pom.xml).
# ══════════════════════════════════════════════════════════════════════
#
# All servers (SMTP, POP3, IMAP) read this file to find the shared
# mailserver directory. This solves the problem of each Maven module
# having its own separate mailserver/ when run from its own directory.
#
# ── HOW TO RUN EACH SERVER ────────────────────────────────────────────
#
#   Option A — pass the path to this file as a system property:
#     cd smtp-server
#     java -Dmail.properties=/home/claude/mail-system/mail.properties \
#          -jar target/smtp-server-1.0.0.jar
#
#   Option B — pass the storage dir directly:
#     java -Dmail.storage.dir=/home/claude/mail-system/mailserver \
#          -jar target/smtp-server-1.0.0.jar
#
#   Option C — place this file in the working directory:
#     cp mail.properties smtp-server/
#     cd smtp-server && java -jar target/smtp-server-1.0.0.jar
#
#   Option D — set environment variable:
#     export MAIL_PROPERTIES=/home/claude/mail-system/mail.properties
#
# ── FOR ÉTAPE 8 (NGINX load balancer, multiple instances) ─────────────
#   Use a shared NFS mount:
#   mail.storage.dir=/mnt/shared-nfs/mailserver
#
# ══════════════════════════════════════════════════════════════════════

