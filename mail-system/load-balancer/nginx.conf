# ══════════════════════════════════════════════════════
# NGINX Load Balancer Configuration (Étape 8)
# Round Robin strategy across 3 API server instances
# ══════════════════════════════════════════════════════

http {

    # ── Backend pool (REST API instances) ─────────────
    upstream mail_api_backend {
        # Round Robin is the default strategy in NGINX
        server localhost:8081;   # Instance 1
        server localhost:8082;   # Instance 2
        server localhost:8083;   # Instance 3

        # Mark a server as down if it fails 3 times in 30s
        # server localhost:8082 max_fails=3 fail_timeout=30s;
    }

    # ── HTTP server block ──────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Forward all requests to the backend pool
        location / {
            proxy_pass         http://mail_api_backend;
            proxy_http_version 1.1;

            # Pass original client info
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://mail_api_backend/health;
        }
    }
}
